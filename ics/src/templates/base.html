<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>{{ site_name }}</h1>
        <p>LAN-only spectrograph control interface</p>
      </div>
      <div class="topbar-actions">
        <button data-action="connect">Connect all</button>
        <button data-action="disconnect">Disconnect</button>
        <button class="danger" data-action="safe">SAFE</button>
        <button data-action="clear-safe">Clear safe</button>
      </div>
    </header>
    <section id="action-error" class="action-error hidden" role="alert" aria-live="assertive">
      <div>
        <div class="action-error-kicker" id="action-error-status">Request failed</div>
        <h2 id="action-error-title">Instrument command failed</h2>
        <p id="action-error-message"></p>
        <dl id="action-error-details"></dl>
      </div>
      <button type="button" class="secondary" data-action="dismiss-error">Dismiss</button>
    </section>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
