<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ site_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>{{ site_name }}</h1>
        <p>LAN-only spectrograph control interface</p>
      </div>
      <div class="topbar-actions">
        <button data-action="connect">Connect all</button>
        <button data-action="disconnect">Disconnect</button>
        <button class="danger" data-action="safe">SAFE</button>
        <button data-action="clear-safe">Clear safe</button>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
